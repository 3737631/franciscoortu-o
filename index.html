<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisco Ortuño - Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .video-container {
            width: 100%;
            max-width: 960px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: block;
            background: #000;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Francisco Ortuño</h1>
    <div class="video-container">
        <video controls playsinline>
            <source src="video/video.mp4" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>
    </div>
    <p class="footer">Coloca tu archivo de video como <code>video/video.mp4</code></p>
</body>
</html>
